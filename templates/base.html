<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Lawiot{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://unpkg.com/htmx.org@2.0.2"></script>
  {% block extra_head %}{% endblock %}
  <style>
  .status-badge {
    display: inline-block;
    padding: 0.1rem 0.5rem;
    border-radius: 0.4rem;
    font-size: 0.85em;
    color: #fff;
  }
  .status-in_force { background: #2e7d32; }
  .status-repealed { background: #c62828; }
  .status-not_in_force { background: #757575; }
  .passport dt { font-weight: 600; }
  </style>
</head>
<body>
  <main class="container">
    <nav>
      <ul><li><strong><a href="{% url 'document_list' %}">Lawiot</a></strong></li></ul>
      <ul>
        {% if user.is_authenticated %}
        <li><a href="{% url 'search' %}">Поиск</a></li>
        <li><a href="{% url 'assistant' %}">Ассистент</a></li>
        <li><a href="{% url 'bookmark_list' %}">Избранное</a></li>
        <li><a href="{% url 'changes_feed' %}">Изменения</a></li>
        {% if user.is_staff %}<li><a href="{% url 'admin:index' %}">Курирование</a></li>{% endif %}
        <li>
          <form method="post" action="{% url 'logout' %}">{% csrf_token %}
            <button type="submit" class="secondary">Выйти</button>
          </form>
        </li>
        {% else %}
        <li><a href="{% url 'login' %}">Войти</a></li>
        {% endif %}
      </ul>
    </nav>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
